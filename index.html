<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrimeMind | Forensic AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050505;
            --neon-red: #ff2a2a;
            --neon-purple: #8a2be2;
            --neon-cyan: #00FFFF;
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            cursor: none; /* Custom cursor */
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Share Tech Mono', monospace;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            position: relative;
        }

        /* Custom Cursor */
        .cursor {
            width: 20px;
            height: 20px;
            border: 2px solid var(--neon-red);
            border-radius: 50%;
            position: absolute;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 9999;
            transition: width 0.1s, height 0.1s;
        }
        .cursor::after, .cursor::before {
            content: '';
            position: absolute;
            background: var(--neon-red);
        }
        .cursor::before { top: -5px; bottom: -5px; left: 8px; width: 2px; }
        .cursor::after { left: -5px; right: -5px; top: 8px; height: 2px; }

        /* Background Canvas */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            opacity: 0.4;
        }

        /* CRT Scanlines Overlay */
        .scanlines {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%,
                rgba(0, 0, 0, 0.25) 50%
            );
            background-size: 100% 4px;
            z-index: -1;
            pointer-events: none;
        }

        /* Header UI */
        .header-container {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
            padding: 20px 40px;
            border-top: 1px solid var(--neon-red);
            border-bottom: 1px solid var(--neon-red);
            animation: bracketsIn 1.5s ease-out forwards;
        }

        .header-container::before, .header-container::after {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            border: 2px solid var(--neon-red);
        }
        .header-container::before { top: 0; left: 0; border-right: none; border-bottom: none; }
        .header-container::after { bottom: 0; right: 0; border-left: none; border-top: none; }

        @keyframes bracketsIn {
            0% { opacity: 0; transform: scale(1.1); }
            100% { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 5rem;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            text-shadow: 0 0 10px rgba(255, 42, 42, 0.8), 0 0 20px var(--neon-purple);
            animation: glitch 3s infinite;
        }

        @keyframes glitch {
            0% { text-shadow: 0 0 10px rgba(255,42,42,0.8); transform: translate(0); }
            2% { text-shadow: -2px 0 var(--neon-cyan), 2px 0 var(--neon-red); transform: translate(-2px, 1px); }
            4% { text-shadow: 0 0 10px rgba(255,42,42,0.8); transform: translate(0); }
            98% { text-shadow: 0 0 10px rgba(255,42,42,0.8); transform: translate(0); }
            99% { text-shadow: 2px 0 var(--neon-cyan), -2px 0 var(--neon-red); transform: translate(2px, -1px); }
            100% { text-shadow: 0 0 10px rgba(255,42,42,0.8); transform: translate(0); }
        }

        .subtitle {
            font-size: 1.2rem;
            color: var(--neon-cyan);
            margin-top: 10px;
            animation: blink 1.5s step-start infinite;
            text-shadow: 0 0 8px var(--neon-cyan);
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 900px;
            width: 100%;
            padding: 0 20px;
        }

        /* Cards */
        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            position: relative;
            text-decoration: none;
            color: var(--text-color);
            transition: all 0.3s ease;
            overflow: hidden;
            display: block;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 4px;
        }

        .card:nth-child(1)::before { background: var(--neon-red); }
        .card:nth-child(2)::before { background: var(--neon-cyan); }
        .card:nth-child(3)::before { background: var(--neon-purple); }
        .card:nth-child(4)::before { background: #ffaa00; }

        .card:hover {
            transform: scale(1.05) translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
        }

        .card:nth-child(1):hover { box-shadow: 0 0 25px rgba(255,42,42,0.4); border-color: var(--neon-red); }
        .card:nth-child(2):hover { box-shadow: 0 0 25px rgba(0,255,255,0.4); border-color: var(--neon-cyan); }
        .card:nth-child(3):hover { box-shadow: 0 0 25px rgba(138,43,226,0.4); border-color: var(--neon-purple); }
        .card:nth-child(4):hover { box-shadow: 0 0 25px rgba(255,170,0,0.4); border-color: #ffaa00; }

        .card h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            margin-bottom: 15px;
            letter-spacing: 2px;
        }

        .card p {
            font-size: 1rem;
            line-height: 1.5;
            color: #b0b0b0;
            min-height: 50px;
        }

        /* Watermarks */
        .watermark {
            position: absolute;
            bottom: 10px; right: 10px;
            font-size: 4rem;
            color: rgba(255,255,255,0.02);
            pointer-events: none;
        }

        .stamp {
            position: absolute;
            color: rgba(255, 42, 42, 0.2);
            border: 2px solid rgba(255, 42, 42, 0.2);
            padding: 5px 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            transform: rotate(-15deg);
            pointer-events: none;
            z-index: -1;
        }
        .stamp-1 { top: 10%; left: 5%; }
        .stamp-2 { bottom: 15%; right: 8%; transform: rotate(10deg); color: rgba(0,255,255,0.1); border-color: rgba(0,255,255,0.1); }

    </style>
</head>
<body>

    <div class="cursor" id="cursor"></div>
    <canvas id="glitchCanvas"></canvas>
    <div class="scanlines"></div>

    <div class="stamp stamp-1">[ CLASSIFIED ]</div>
    <div class="stamp stamp-2">[ CASE ACTIVE ]</div>

    <div class="header-container">
        <h1>CrimeMind</h1>
        <div class="subtitle">[ INITIATING FORENSIC PROTOCOL... ]</div>
    </div>

    <div class="grid">
        <a href="http://localhost:8501" class="card" data-text="Enter the sandbox environment to simulate open-ended detective scenarios, interrogations, and criminal pursuits.">
            <h2>SUSPECT PROFILER</h2>
            <p class="scramble-text">!@#$%^&*()_+|}{":?><</p>
            <div class="watermark">⌖</div>
        </a>
        <a href="http://localhost:8501" class="card" data-text="Upload crime scene photos or describe the evidence. The AI will logically deduce the sequence of events.">
            <h2>EVIDENCE ANALYZER</h2>
            <p class="scramble-text">~`1234567890-=qwerty</p>
            <div class="watermark">👁</div>
        </a>
        <a href="http://localhost:8501" class="card" data-text="Think of a famous suspect. The AI will ask probing Yes/No questions until it identifies your target.">
            <h2>CRIME MAPPER</h2>
            <p class="scramble-text">asdfghjkl;'\zxcvbnm,.</p>
            <div class="watermark">🗺</div>
        </a>
        <a href="http://localhost:8501" class="card" data-text="Face off against a ruthless interrogator. Try to keep your story straight as the AI hunts for your lies.">
            <h2>INTERROGATION SIM</h2>
            <p class="scramble-text">!@#$%qwerasdfzxcv123</p>
            <div class="watermark">☣</div>
        </a>
    </div>

    <script>
        // Custom Cursor
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', e => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Web Audio API for Hover Sound
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playStatic() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // Text Scramble Effect
        const chars = '!<>-_\\/[]{}—=+*^?#________';
        const cards = document.querySelectorAll('.card');

        cards.forEach(card => {
            const targetText = card.getAttribute('data-text');
            const p = card.querySelector('.scramble-text');
            let interval = null;

            card.addEventListener('mouseenter', () => {
                playStatic();
                cursor.style.width = '30px';
                cursor.style.height = '30px';
                
                let iteration = 0;
                clearInterval(interval);
                
                interval = setInterval(() => {
                    p.innerText = targetText.split('').map((letter, index) => {
                        if(index < iteration) {
                            return targetText[index];
                        }
                        return chars[Math.floor(Math.random() * chars.length)];
                    }).join('');
                    
                    if(iteration >= targetText.length) {
                        clearInterval(interval);
                    }
                    iteration += 1/3; // Decrypt speed
                }, 20);
            });

            card.addEventListener('mouseleave', () => {
                cursor.style.width = '20px';
                cursor.style.height = '20px';
                clearInterval(interval);
                p.innerText = '!@#$%^&*()_+|}{":?><'; // Reset to garble
            });
        });

        // Background Glitch Canvas
        const canvas = document.getElementById('glitchCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        for(let i=0; i<100; i++){
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                w: Math.random() * 50 + 10,
                h: Math.random() * 5 + 1,
                c: Math.random() > 0.5 ? '#ff2a2a' : '#00FFFF',
                v: Math.random() * 5 + 1
            });
        }

        function draw() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                ctx.fillStyle = p.c;
                ctx.fillRect(p.x, p.y, p.w, p.h);
                p.x -= p.v;
                if(p.x < -p.w) p.x = canvas.width;
                
                // Random vertical glitch jump
                if(Math.random() < 0.01) p.y = Math.random() * canvas.height;
            });

            requestAnimationFrame(draw);
        }
        draw();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
